{% extends 'frontend/base.html' %}
{% load static %}

{% block title %}TOYBOX！ - ログイン{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        max-width: 400px;
        margin: 4rem auto;
        padding: 2rem;
        background: var(--steam-iron-900);
        border-radius: 8px;
        border: 1px solid var(--steam-iron-700);
    }
    
    .login-container h1 {
        font-size: 1.5rem;
        color: var(--steam-gold-300);
        margin-bottom: 1.5rem;
        text-align: center;
    }
    
    .form-group {
        margin-bottom: 1rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--steam-gold-300);
        font-size: 0.875rem;
    }
    
    .error {
        color: #dc2626;
        margin-top: 0.5rem;
        font-size: 0.875rem;
        padding: 0.5rem;
        border-radius: 4px;
        background: rgba(220, 38, 38, 0.1);
        border: 1px solid rgba(220, 38, 38, 0.3);
    }
    
    .success {
        color: #16a34a;
        margin-top: 0.5rem;
        font-size: 0.875rem;
        padding: 0.5rem;
        border-radius: 4px;
        background: rgba(22, 163, 74, 0.1);
        border: 1px solid rgba(22, 163, 74, 0.3);
    }
    
    .back-link {
        text-align: center;
        margin-top: 1rem;
    }
    
    .back-link a {
        color: var(--steam-iron-400);
        text-decoration: none;
    }
    
    .back-link a:hover {
        text-decoration: underline;
    }
    
    .penalty-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    
    .penalty-modal.show {
        display: flex;
    }
    
    .penalty-modal-content {
        background: var(--steam-iron-900);
        border: 2px solid var(--steam-gold-300);
        border-radius: 8px;
        padding: 2rem;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    
    .penalty-modal-header {
        color: var(--steam-gold-300);
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .penalty-modal-header.warning {
        color: #fbbf24;
    }
    
    .penalty-modal-header.suspend {
        color: #f59e0b;
    }
    
    .penalty-modal-header.ban {
        color: #dc2626;
    }
    
    .penalty-modal-body {
        color: var(--steam-iron-100);
        font-size: 1rem;
        line-height: 1.8;
        white-space: pre-wrap;
        margin-bottom: 1.5rem;
    }
    
    .penalty-modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
    }
    
    .penalty-modal-button {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        transition: opacity 0.2s;
    }
    
    .penalty-modal-button:hover {
        opacity: 0.9;
    }
    
    .penalty-modal-button-primary {
        background: var(--steam-gold-500);
        color: #000;
    }
    
    .login-divider {
        display: flex;
        align-items: center;
        margin: 1.5rem 0;
        text-align: center;
    }
    
    .login-divider::before,
    .login-divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid var(--steam-iron-700);
    }
    
    .login-divider span {
        padding: 0 1rem;
        color: var(--steam-iron-400);
        font-size: 0.875rem;
    }
    
    .studysphere-login-section {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--steam-iron-700);
    }
    
    .studysphere-login-section h2 {
        font-size: 1rem;
        color: var(--steam-gold-300);
        margin-bottom: 0.75rem;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <h1>ToyBox</h1>
    {% csrf_token %}
    <form id="loginForm">
        <div class="form-group">
            <label for="display_id">ID</label>
            <input type="text" id="display_id" name="display_id" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="success" class="success" style="display: none;"></div>
        <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%; padding: 0.75rem;">ログイン</button>
    </form>
    
    <div class="login-divider">
        <span>または</span>
    </div>
    
    <div class="studysphere-login-section">
        <h2>StudySphereでログイン</h2>
        <form id="studysphereLoginForm">
            <div class="form-group">
                <label for="studysphere_token">StudySphereトークン</label>
                <input type="text" id="studysphere_token" name="studysphere_token" placeholder="StudySphereトークンを入力" autocomplete="off">
            </div>
            <div id="studysphere-error" class="error" style="display: none;"></div>
            <div id="studysphere-success" class="success" style="display: none;"></div>
            <button type="submit" class="btn btn-primary" id="studysphereSubmitBtn" style="width: 100%; padding: 0.75rem; background: var(--steam-gold-500); color: #000;">StudySphereでログイン</button>
        </form>
    </div>
    
    <div class="back-link">
        <a href="/">トップページに戻る</a>
    </div>
</div>

<!-- 警告メッセージモーダル -->
<div id="penaltyModal" class="penalty-modal">
    <div class="penalty-modal-content">
        <div id="penaltyModalHeader" class="penalty-modal-header"></div>
        <div id="penaltyModalBody" class="penalty-modal-body"></div>
        <div class="penalty-modal-footer">
            <button id="penaltyModalClose" class="penalty-modal-button penalty-modal-button-primary">了解しました</button>
        </div>
    </div>
</div>

<script>
    // ページ読み込み時に認証チェック
    document.addEventListener('DOMContentLoaded', async function() {
        // チケットがある場合はSSO処理を優先
        const urlParams = new URLSearchParams(window.location.search);
        const hasTicket = urlParams.get('ticket');
        
        if (!hasTicket) {
            // チケットがない場合のみ通常の認証チェック（サーバー側で確認）
            await checkServerAuthentication();
        }
        
        hideLoginPageNavigation();
        checkSSOTicket(); // StudySphereからのチケットをチェック
    });
    
    // サーバー側で認証状態を確認
    async function checkServerAuthentication() {
        const token = getAccessToken();
        if (!token) {
            return; // トークンがなければログイン画面を表示
        }
        
        try {
            // サーバー側で認証を確認
            const response = await fetch('/api/users/me/', {
                headers: {
                    'Authorization': `Bearer ${token}`,
                }
            });
            
            if (response.ok) {
                // 認証成功 - マイページへリダイレクト
                window.location.href = '/me/';
            } else {
                // 認証失敗 - トークンをクリアしてログイン画面を表示
                localStorage.removeItem('access_token');
                localStorage.removeItem('refresh_token');
            }
        } catch (err) {
            // エラー時はトークンをクリア
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
        }
    }
    
    // ログインページでヘッダーの「みんなの投稿」を非表示にする
    function hideLoginPageNavigation() {
        // 「みんなの投稿」リンクを非表示
        const feedLink = document.querySelector('a[href="/feed/"]');
        if (feedLink) {
            feedLink.style.display = 'none';
        }
    }
    
    function applySSOLoginState(ticket, ssoData, loggedIn) {
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const loginForm = document.getElementById('loginForm');

        if (loggedIn) {
            // 既にセッションログイン済みなので、自動的にマイページへリダイレクト
            if (successDiv) {
                successDiv.textContent = 'StudySphere認証が完了しました。マイページへ移動しています...';
                successDiv.style.display = 'block';
            }
            console.log('[SSO] Already logged in, redirecting to /me/');
            // 少し待ってからリダイレクト（メッセージを表示するため）
            setTimeout(() => {
                window.location.href = '/me/';
            }, 1000);
            return; // これ以降の処理は不要
        }

        // アカウントあり → IDフィールドに自動入力して、パスワードなしでログイン可能にする
        console.log('[SSO] Account found, preparing login form...');

        // SSO情報をセッションストレージに保存（未ログイン時のみ）
        if (ssoData && !loggedIn) {
            sessionStorage.setItem('sso_login_data', JSON.stringify({
                ticket: ticket,
                sso_data: ssoData
            }));
        }

        // IDフィールドに自動入力
        const displayIdInput = document.getElementById('display_id');
        if (displayIdInput && ssoData && ssoData.studysphere_username) {
            // StudySphereのusernameを小文字・英数字・アンダースコアのみに変換して自動入力
            const suggestedId = ssoData.studysphere_username
                .toLowerCase()
                .replace(/[^a-z0-9_]/g, '_')
                .substring(0, 30);
            displayIdInput.value = suggestedId;
            // StudySphere連携の場合、IDを変更できないようにする
            displayIdInput.readOnly = true;
            displayIdInput.style.opacity = '0.7';
            displayIdInput.style.cursor = 'not-allowed';
        }

        // パスワードフィールドを非表示またはオプションにする
        const passwordInput = document.getElementById('password');
        const passwordLabel = passwordInput ? passwordInput.previousElementSibling : null;
        if (passwordInput) {
            passwordInput.required = false;
            passwordInput.placeholder = 'パスワードは不要です（StudySphere経由）';
            passwordInput.style.opacity = '0.5';
        }
        if (passwordLabel) {
            passwordLabel.textContent = 'パスワード（StudySphere経由のため不要）';
        }

        // フォームを表示
        if (loginForm) loginForm.style.display = 'block';
        if (successDiv && !loggedIn) {
            successDiv.textContent = 'StudySphereアカウントが見つかりました。IDが自動入力されています。「ログイン」ボタンをクリックしてください。';
            successDiv.style.display = 'block';
        }

        // フォーム送信時にSSOログインAPIを呼び出すように変更（未ログイン時のみ）
        if (loginForm && !loggedIn) {
            loginForm.onsubmit = async function(e) {
                e.preventDefault();
                await handleSSOLogin(e);
            };
        }

        if (errorDiv) errorDiv.style.display = 'none';
    }

    // StudySphereからのSSOチケットをチェック
    async function checkSSOTicket() {
        const urlParams = new URLSearchParams(window.location.search);
        const ticket = urlParams.get('ticket');
        
        // デバッグ用: 詳細な情報をログ出力
        console.log('[SSO] ========== SSO Debug Info ==========');
        console.log('[SSO] Current URL:', window.location.href);
        console.log('[SSO] URL Search:', window.location.search);
        console.log('[SSO] All URL Parameters:', Object.fromEntries(urlParams));
        console.log('[SSO] Ticket value:', ticket);
        console.log('[SSO] Ticket type:', typeof ticket);
        console.log('[SSO] Ticket length:', ticket ? ticket.length : 0);
        if (ticket) {
            console.log('[SSO] Ticket preview (first 20 chars):', ticket.substring(0, 20) + '...');
        }
        console.log('[SSO] ====================================');
        
        if (!ticket) {
            console.log('[SSO] No ticket found in URL parameters');
            return; // チケットがない場合は通常のログイン画面
        }
        
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const submitBtn = document.getElementById('submitBtn');
        const loginForm = document.getElementById('loginForm');

        // 既に検証済みのチケットは再検証しない
        const cachedTicket = sessionStorage.getItem('sso_verified_ticket');
        const cachedLoginDataStr = sessionStorage.getItem('sso_login_data');
        const cachedLoggedIn = sessionStorage.getItem('sso_logged_in');
        if (cachedTicket && cachedTicket === ticket && cachedLoginDataStr) {
            try {
                const cachedLoginData = JSON.parse(cachedLoginDataStr);
                applySSOLoginState(ticket, cachedLoginData.sso_data, cachedLoggedIn === 'true');
                return;
            } catch (err) {
                console.error('[SSO] Failed to parse cached login data:', err);
            }
        }
        
        // ローディング表示
        if (loginForm) loginForm.style.display = 'none';
        if (successDiv) {
            successDiv.textContent = 'StudySphereから連携中...';
            successDiv.style.display = 'block';
        }
        
        try {
            console.log('[SSO] Calling verify-and-check API...');
            const response = await fetch(`/sso/verify-and-check/?ticket=${encodeURIComponent(ticket)}`, {
                method: 'GET',
            });
            
            console.log('[SSO] API response status:', response.status);
            const data = await response.json();
            console.log('[SSO] API response data:', data);
            
            if (!response.ok) {
                // エラー
                console.error('[SSO] API error:', data.error);
                if (errorDiv) {
                    errorDiv.textContent = data.error || 'SSO認証に失敗しました';
                    errorDiv.style.display = 'block';
                }
                if (successDiv) successDiv.style.display = 'none';
                if (loginForm) loginForm.style.display = 'block';
                return;
            }
            
            if (data.has_account) {
                const hasTokens = !!data.access;
                if (hasTokens) {
                    setAccessToken(data.access);
                    if (data.refresh) {
                        setRefreshToken(data.refresh);
                    }
                }
                // 再検証防止用に保存
                sessionStorage.setItem('sso_verified_ticket', ticket);
                sessionStorage.setItem('sso_logged_in', (data.logged_in || hasTokens) ? 'true' : 'false');
                applySSOLoginState(ticket, data.sso_data, !!(data.logged_in || hasTokens));
            } else if (data.sso_data) {
                // アカウントなし → 登録画面へ
                console.log('[SSO] No account found, redirecting to signup...');
                console.log('[SSO] SSO data:', data.sso_data);
                
                // SSO情報をセッションストレージに保存
                sessionStorage.setItem('sso_signup_data', JSON.stringify(data.sso_data));
                sessionStorage.setItem('sso_verified_ticket', ticket);
                console.log('[SSO] Saved to sessionStorage');
                
                if (successDiv) {
                    successDiv.textContent = 'StudySphereアカウントが見つかりました。アカウント作成画面へ移動します...';
                    successDiv.style.display = 'block';
                }
                
                console.log('[SSO] Redirecting to /signup/?from=sso in 1.5s');
                setTimeout(() => {
                    console.log('[SSO] Executing redirect now');
                    window.location.href = '/signup/?from=sso';
                }, 1500);
            } else {
                console.error('[SSO] Unexpected response structure:', data);
                if (errorDiv) {
                    errorDiv.textContent = '予期しない応答形式です';
                    errorDiv.style.display = 'block';
                }
                if (successDiv) successDiv.style.display = 'none';
                if (loginForm) loginForm.style.display = 'block';
            }
        } catch (err) {
            console.error('[SSO] check error:', err);
            if (errorDiv) {
                errorDiv.textContent = 'SSO認証中にエラーが発生しました: ' + err.message;
                errorDiv.style.display = 'block';
            }
            if (successDiv) successDiv.style.display = 'none';
            if (loginForm) loginForm.style.display = 'block';
        }
    }
    
    // SSO経由のログイン処理
    async function handleSSOLogin(e) {
        e.preventDefault();
        
        const ssoLoginDataStr = sessionStorage.getItem('sso_login_data');
        if (!ssoLoginDataStr) {
            // SSO情報がない場合は通常のログイン処理
            handleNormalLogin(e);
            return;
        }
        
        const ssoLoginData = JSON.parse(ssoLoginDataStr);
        const ticket = ssoLoginData.ticket;
        const displayId = document.getElementById('display_id').value.trim();
        
        if (!displayId) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = 'IDを入力してください';
            errorDiv.style.display = 'block';
            return;
        }
        
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const submitBtn = document.getElementById('submitBtn');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'ログイン中...';
        
        try {
            const response = await fetch('/sso/login-with-ticket/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    display_id: displayId,
                    ticket: ticket
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.access) {
                setAccessToken(data.access);
                if (data.refresh) {
                    setRefreshToken(data.refresh);
                }
                
                // SSO情報をクリア
                sessionStorage.removeItem('sso_login_data');
                
                // 警告メッセージがある場合は表示
                if (data.penalty && data.penalty.message) {
                    showPenaltyModal(data.penalty.type, data.penalty.message);
                } else {
                    const redirectUrl = '/me/';
                    const redirectMessage = 'ログイン成功！マイページへ移動します...';
                    
                    successDiv.textContent = redirectMessage;
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1000);
                }
            } else {
                errorDiv.textContent = data.error || 'ログインに失敗しました';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'ログイン';
            }
        } catch (err) {
            errorDiv.textContent = 'エラーが発生しました: ' + err.message;
            errorDiv.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'ログイン';
        }
    }
    
    // 通常のログイン処理
    async function handleNormalLogin(e) {
        e.preventDefault();
        
        const displayId = document.getElementById('display_id').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const submitBtn = document.getElementById('submitBtn');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'ログイン中...';
        
        try {
            const response = await fetch('/api/auth/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    display_id: displayId,
                    password: password
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.access) {
                setAccessToken(data.access);
                if (data.refresh) {
                    setRefreshToken(data.refresh);
                }
                
                // 警告メッセージがある場合は表示
                if (data.penalty && data.penalty.message) {
                    showPenaltyModal(data.penalty.type, data.penalty.message);
                } else {
                    // ロールに応じてリダイレクト先を決定
                    // デバッグ用: ロール情報を確認
                    console.log('Login response:', data);
                    console.log('User role:', data.role);
                    
                    const redirectUrl = '/me/';
                    const redirectMessage = 'ログイン成功！マイページへ移動します...';
                    
                    successDiv.textContent = redirectMessage;
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        console.log('Redirecting to:', redirectUrl);
                        window.location.href = redirectUrl;
                    }, 1000);
                }
            } else {
                errorDiv.textContent = data.detail || data.non_field_errors?.[0] || 'ログインに失敗しました';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'ログイン';
            }
        } catch (err) {
            errorDiv.textContent = 'エラーが発生しました';
            errorDiv.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'ログイン';
        }
    }
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        // SSO経由の場合はhandleSSOLogin、そうでない場合はhandleNormalLogin
        const ssoLoginDataStr = sessionStorage.getItem('sso_login_data');
        if (ssoLoginDataStr) {
            await handleSSOLogin(e);
        } else {
            await handleNormalLogin(e);
        }
    });
    
    // StudySphereトークンでログイン
    async function handleStudySphereTokenLogin(e) {
        e.preventDefault();
        
        const token = document.getElementById('studysphere_token').value.trim();
        const errorDiv = document.getElementById('studysphere-error');
        const successDiv = document.getElementById('studysphere-success');
        const submitBtn = document.getElementById('studysphereSubmitBtn');
        
        if (!token) {
            if (errorDiv) {
                errorDiv.textContent = 'トークンを入力してください';
                errorDiv.style.display = 'block';
            }
            if (successDiv) {
                successDiv.style.display = 'none';
            }
            return;
        }
        
        // CSRFトークンを取得
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
        
        // デバッグログ
        console.log('[StudySphere Token Login] Attempting login with token:', token.substring(0, 20) + '...', 'length:', token.length);
        console.log('[StudySphere Token Login] CSRF token:', csrfToken ? csrfToken.substring(0, 20) + '...' : 'not found');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'ログイン中...';
        
        try {
            const headers = {
                'Content-Type': 'application/json',
            };
            
            // CSRFトークンをヘッダーに追加
            if (csrfToken) {
                headers['X-CSRFToken'] = csrfToken;
            }
            
            const response = await fetch('/api/auth/login-with-studysphere-token/', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({
                    token: token
                })
            });
            
            console.log('[StudySphere Token Login] Response status:', response.status);
            const data = await response.json();
            console.log('[StudySphere Token Login] Response data:', data);
            
            if (response.ok && data.access) {
                setAccessToken(data.access);
                if (data.refresh) {
                    setRefreshToken(data.refresh);
                }
                
                // 警告メッセージがある場合は表示
                if (data.penalty && data.penalty.message) {
                    showPenaltyModal(data.penalty.type, data.penalty.message);
                } else {
                    const redirectUrl = '/me/';
                    const redirectMessage = 'ログイン成功！マイページへ移動します...';
                    
                    if (successDiv) {
                        successDiv.textContent = redirectMessage;
                        successDiv.style.display = 'block';
                    }
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1000);
                }
            } else {
                console.error('[StudySphere Token Login] Login failed:', data);
                if (errorDiv) {
                    errorDiv.textContent = data.error || 'ログインに失敗しました';
                    errorDiv.style.display = 'block';
                }
                submitBtn.disabled = false;
                submitBtn.textContent = 'StudySphereでログイン';
            }
        } catch (err) {
            console.error('[StudySphere Token Login] Error:', err);
            if (errorDiv) {
                errorDiv.textContent = 'エラーが発生しました: ' + err.message;
                errorDiv.style.display = 'block';
            }
            submitBtn.disabled = false;
            submitBtn.textContent = 'StudySphereでログイン';
        }
    }
    
    document.getElementById('studysphereLoginForm').addEventListener('submit', handleStudySphereTokenLogin);
    
    function showPenaltyModal(type, message) {
        const modal = document.getElementById('penaltyModal');
        const header = document.getElementById('penaltyModalHeader');
        const body = document.getElementById('penaltyModalBody');
        const closeBtn = document.getElementById('penaltyModalClose');
        
        // タイプに応じたヘッダーを設定
        let headerText = '';
        let headerClass = '';
        if (type === 'WARNING') {
            headerText = '⚠️ 警告';
            headerClass = 'warning';
        } else if (type === 'SUSPEND') {
            headerText = '⛔ アカウント停止';
            headerClass = 'suspend';
        } else if (type === 'BAN') {
            headerText = '🚫 BAN（アカウント削除）';
            headerClass = 'ban';
        } else {
            headerText = '⚠️ お知らせ';
            headerClass = 'warning';
        }
        
        header.textContent = headerText;
        header.className = 'penalty-modal-header ' + headerClass;
        body.textContent = message;
        
        modal.classList.add('show');
        
        // 閉じるボタンのイベント
        closeBtn.onclick = function() {
            modal.classList.remove('show');
            
            // タイプに応じて異なる処理
            if (type === 'WARNING') {
                // 警告の場合はマイページにリダイレクト
                const successDiv = document.getElementById('success');
                successDiv.textContent = 'ログイン成功！マイページへ移動します...';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/me/';
                }, 500);
            } else if (type === 'SUSPEND' || type === 'BAN') {
                // アカウント停止またはBANの場合はトークンを削除してログインページに戻る
                clearAuth();
                const errorDiv = document.getElementById('error');
                if (type === 'SUSPEND') {
                    errorDiv.textContent = 'アカウントが停止されています。ログインページに戻ります。';
                } else {
                    errorDiv.textContent = 'アカウントが削除されました。ログインページに戻ります。';
                }
                errorDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/login/';
                }, 2000);
            }
        };
        
        // モーダル外をクリックしても閉じない（重要メッセージのため）
    }
</script>
{% endblock %}
